<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMAZON SECURITY LAB | DASHBOARD</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #0d1320;
            --bg-card: #111827;
            --bg-hover: #1a2332;
            --border-color: #1e3a5f;
            --border-glow: #00ff88;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --accent-green: #00ff88;
            --accent-cyan: #00d4ff;
            --accent-red: #ff4757;
            --accent-yellow: #ffd700;
            --accent-orange: #ff9900;
            --danger: #dc2626;
            --danger-glow: rgba(220, 38, 38, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', 'Cairo', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Matrix Rain Background */
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.03;
            pointer-events: none;
        }

        /* Scanline Effect */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            z-index: 9999;
            pointer-events: none;
            opacity: 0.3;
        }

        /* Glitch Effect */
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        @keyframes glitch-anim {
            0% { clip-path: inset(40% 0 61% 0); transform: translate(-2px, 2px); }
            20% { clip-path: inset(92% 0 1% 0); transform: translate(2px, -2px); }
            40% { clip-path: inset(43% 0 1% 0); transform: translate(-2px, 2px); }
            60% { clip-path: inset(25% 0 58% 0); transform: translate(2px, -2px); }
            80% { clip-path: inset(54% 0 7% 0); transform: translate(-2px, 2px); }
            100% { clip-path: inset(58% 0 43% 0); transform: translate(0); }
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 5px var(--accent-green), 0 0 10px var(--accent-green); }
            50% { box-shadow: 0 0 20px var(--accent-green), 0 0 30px var(--accent-green); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes border-flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Header */
        .header {
            background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-green), transparent);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            border: 2px solid var(--accent-green);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            animation: pulse-glow 2s infinite;
        }

        .logo-text {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .logo-text .amazon { color: var(--accent-orange); }
        .logo-text .lab { color: var(--accent-green); }

        .logo-text::after {
            content: '_';
            animation: blink 1s infinite;
            color: var(--accent-green);
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-green);
            box-shadow: 0 0 8px var(--accent-green);
            animation: pulse-glow 2s infinite;
        }

        .status-dot.warning { background: var(--accent-yellow); box-shadow: 0 0 8px var(--accent-yellow); }
        .status-dot.danger { background: var(--accent-red); box-shadow: 0 0 8px var(--accent-red); }

        .time-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--accent-cyan);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 4px;
            background: var(--bg-card);
        }

        /* Main Layout */
        .main-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: calc(100vh - 73px);
            position: relative;
            z-index: 1;
        }

        /* Sidebar */
        .sidebar {
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            color: var(--text-secondary);
            border: 1px solid transparent;
        }

        .nav-item:hover {
            background: var(--bg-hover);
            border-color: var(--border-color);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: rgba(0, 255, 136, 0.1);
            border-color: var(--accent-green);
            color: var(--accent-green);
        }

        .nav-icon {
            font-size: 16px;
            width: 24px;
            text-align: center;
        }

        .nav-badge {
            margin-right: auto;
            background: var(--accent-red);
            color: #fff;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 700;
        }

        /* Content Area */
        .content {
            padding: 24px 32px;
            overflow-y: auto;
        }

        /* Terminal Header */
        .terminal-header {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
        }

        .terminal-prompt {
            color: var(--accent-green);
        }

        .terminal-text {
            color: var(--text-secondary);
        }

        .terminal-cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: var(--accent-green);
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-green), var(--accent-cyan));
        }

        .stat-card:hover {
            border-color: var(--accent-green);
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0, 255, 136, 0.1);
        }

        .stat-card.danger::before {
            background: linear-gradient(90deg, var(--accent-red), var(--accent-yellow));
        }

        .stat-card.danger:hover {
            border-color: var(--accent-red);
            box-shadow: 0 10px 40px rgba(255, 71, 87, 0.1);
        }

        .stat-card.warning::before {
            background: linear-gradient(90deg, var(--accent-yellow), var(--accent-orange));
        }

        .stat-card.warning:hover {
            border-color: var(--accent-yellow);
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.1);
        }

        .stat-icon {
            font-size: 24px;
            margin-bottom: 12px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
        }

        .stat-value.green { color: var(--accent-green); text-shadow: 0 0 10px rgba(0, 255, 136, 0.3); }
        .stat-value.yellow { color: var(--accent-yellow); text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
        .stat-value.red { color: var(--accent-red); text-shadow: 0 0 10px rgba(255, 71, 87, 0.3); }
        .stat-value.cyan { color: var(--accent-cyan); text-shadow: 0 0 10px rgba(0, 212, 255, 0.3); }

        .stat-change {
            font-size: 12px;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-change.up { color: var(--accent-green); }
        .stat-change.down { color: var(--accent-red); }

        /* Section Title */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title .line {
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, var(--accent-green), var(--accent-cyan));
            border-radius: 2px;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--accent-green);
        }

        .live-dot {
            width: 6px;
            height: 6px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: pulse-glow 1.5s infinite;
        }

        /* Client Cards */
        .clients-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 16px;
        }

        .client-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            animation: slideIn 0.5s ease-out;
            transition: all 0.3s;
        }

        .client-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: linear-gradient(180deg, var(--accent-green), transparent);
        }

        .client-card:hover {
            border-color: var(--accent-green);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.1);
        }

        .client-card.new::before { background: linear-gradient(180deg, var(--accent-cyan), transparent); }
        .client-card.new:hover { border-color: var(--accent-cyan); }

        .client-card.otp::before { background: linear-gradient(180deg, var(--accent-yellow), transparent); }
        .client-card.otp:hover { border-color: var(--accent-yellow); }

        .client-card.done::before { background: linear-gradient(180deg, var(--accent-red), transparent); }
        .client-card.done:hover { border-color: var(--accent-red); }

        .client-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .client-id {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .client-avatar {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-cyan));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            color: var(--bg-primary);
        }

        .client-name {
            font-size: 14px;
            font-weight: 600;
        }

        .client-ip {
            font-size: 11px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .client-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-new {
            background: rgba(0, 212, 255, 0.15);
            color: var(--accent-cyan);
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .status-login {
            background: rgba(0, 255, 136, 0.15);
            color: var(--accent-green);
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .status-otp {
            background: rgba(255, 215, 0, 0.15);
            color: var(--accent-yellow);
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .status-done {
            background: rgba(255, 71, 87, 0.15);
            color: var(--accent-red);
            border: 1px solid rgba(255, 71, 87, 0.3);
        }

        /* Client Data Grid */
        .client-data {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .data-field {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
        }

        .data-field.full-width {
            grid-column: 1 / -1;
        }

        .data-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .data-value {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            word-break: break-all;
        }

        .data-value.phone { color: var(--accent-cyan); }
        .data-value.password { color: var(--accent-red); }
        .data-value.otp { color: var(--accent-yellow); font-size: 18px; }
        .data-value.link {
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* Progress Bar */
        .progress-container {
            margin-bottom: 16px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .progress-bar {
            height: 6px;
            background: var(--bg-primary);
            border-radius: 3px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: 20px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3));
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-20px); }
            100% { transform: translateX(20px); }
        }

        .progress-fill.step-1 { width: 33%; background: linear-gradient(90deg, var(--accent-cyan), var(--accent-green)); }
        .progress-fill.step-2 { width: 66%; background: linear-gradient(90deg, var(--accent-green), var(--accent-yellow)); }
        .progress-fill.step-3 { width: 100%; background: linear-gradient(90deg, var(--accent-yellow), var(--accent-red)); }

        /* Action Buttons */
        .client-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn {
            padding: 10px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: var(--bg-primary);
            color: var(--text-secondary);
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-otp {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.1), rgba(0, 255, 136, 0.05));
            border-
